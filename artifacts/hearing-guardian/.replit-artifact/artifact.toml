kind = "mobile"
previewPath = "/"
title = "Hearing Guardian"
version = "1.0.0"
id = "artifacts/hearing-guardian"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19491

[services.development]
run = "pnpm --filter @workspace/hearing-guardian run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hearing-guardian", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/hearing-guardian", "run", "serve" ]

[services.env]
PORT = "19491"
BASE_PATH = "/"
